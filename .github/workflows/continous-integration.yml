name: Tests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: "25 7 */9 * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "314", "314t"]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: boidolr/actions/run-tox@78fcb6a2be7c1aa3e87f5b751139441d1b3a3bb0 # main
        with:
          python-version: ${{ matrix.python-version }}

  precommit:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: boidolr/actions/run-precommit@78fcb6a2be7c1aa3e87f5b751139441d1b3a3bb0 # main
        env:
          UV_PYTHON: "3.14"
